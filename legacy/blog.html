<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدونة | ELBA 7RAWY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .page-header { background: linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.9)), url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0a0a0a', secondary: '#FFD700', accent: '#1a1a1a' }
                }
            }
        }
    </script>
</head>
<body x-data="{ mobileMenuOpen: false, ...siteData }" class="bg-primary text-white">

    <!-- Header (Shared) -->
    <header class="fixed w-full z-50 bg-black/80 backdrop-blur-lg border-b border-white/5">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-secondary tracking-tighter">ELBA 7RAWY</a>
            <nav class="hidden lg:flex items-center space-x-reverse space-x-8 font-bold text-sm">
                <a href="index.html" class="hover:text-secondary transition">الرئيسية</a>
                <a href="services.html" class="hover:text-secondary transition">خدماتنا</a>
                <a href="portfolio.html" class="hover:text-secondary transition">المعرض</a>
                <a href="blog.html" class="text-secondary">المدونة</a>
                <a href="contact.html" class="hover:text-secondary transition">تواصل معنا</a>
            </nav>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden text-2xl text-secondary">
                <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
            </button>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header pt-48 pb-32 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-black/50"></div>
        <div class="container mx-auto px-4 relative z-10">
            <h1 class="text-5xl md:text-7xl font-black mb-6 glow" data-aos="fade-down">المدونة</h1>
            <div class="h-1.5 w-24 bg-secondary mx-auto"></div>
        </div>
    </section>

    <!-- Blog List -->
    <section class="py-32">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
                <!-- Posts -->
                <div class="lg:col-span-2 space-y-16">
                    <template x-for="post in blog" :key="post.id">
                        <article class="bg-accent rounded-[3rem] overflow-hidden border border-white/5 group hover:border-secondary/20 transition-all duration-500" data-aos="fade-up">
                            <div class="relative h-96 overflow-hidden">
                                <img :src="post.image" :alt="post.title" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-8 right-8 bg-secondary text-black px-6 py-2 rounded-full text-xs font-black">تسويق</div>
                            </div>
                            <div class="p-12">
                                <div class="flex items-center text-xs text-gray-500 mb-6 font-bold uppercase tracking-widest">
                                    <i class="fas fa-calendar-alt ml-2 text-secondary"></i>
                                    <span x-text="post.date"></span>
                                    <span class="mx-4 opacity-20">|</span>
                                    <i class="fas fa-user ml-2 text-secondary"></i>
                                    <span>بواسطة الآدمن</span>
                                </div>
                                <h2 class="text-4xl font-black mb-6 group-hover:text-secondary transition" x-text="post.title"></h2>
                                <p class="text-gray-400 text-lg leading-relaxed mb-10" x-text="post.summary"></p>
                                <a href="#" class="inline-flex items-center bg-white/5 hover:bg-secondary hover:text-black px-10 py-4 rounded-2xl font-black transition-all duration-500">
                                    اقرأ المزيد <i class="fas fa-arrow-left mr-4"></i>
                                </a>
                            </div>
                        </article>
                    </template>
                </div>

                <!-- Sidebar -->
                <aside class="space-y-12">
                    <div class="bg-accent p-10 rounded-[2.5rem] border border-white/5">
                        <h3 class="text-xl font-black mb-8 border-r-4 border-secondary pr-4">بحث</h3>
                        <div class="relative">
                            <input type="text" placeholder="ابحث عن مقال..." class="w-full bg-black/50 border border-white/5 rounded-2xl px-6 py-4 focus:outline-none focus:border-secondary transition">
                            <button class="absolute left-4 top-4 text-gray-500"><i class="fas fa-search"></i></button>
                        </div>
                    </div>

                    <div class="bg-secondary p-10 rounded-[2.5rem] text-black">
                        <i class="fas fa-bolt text-4xl mb-6"></i>
                        <h3 class="text-2xl font-black mb-4">اشترك في النشرة</h3>
                        <p class="font-bold opacity-70 mb-8 text-sm leading-relaxed">كن أول من يعلم بأحدث تقنيات الدعاية والإعلان والذكاء الاصطناعي.</p>
                        <form class="space-y-4">
                            <input type="email" placeholder="بريدك الإلكتروني" class="w-full bg-black/10 border border-black/10 rounded-xl px-4 py-3 placeholder-black/50 focus:outline-none focus:border-black transition">
                            <button class="w-full bg-black text-white font-black py-4 rounded-xl hover:scale-105 transition">اشتراك الآن</button>
                        </form>
                    </div>
                </aside>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black border-t border-white/5 py-10 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 ELBA 7RAWY. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="data.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
