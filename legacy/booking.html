<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد | البرحاوي للدعاية والإعلان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1e3a8a', secondary: '#3b82f6', accent: '#fbbf24' }
                }
            }
        }
    </script>
</head>
<body x-data="{ 
    mobileMenuOpen: false, 
    step: 1, 
    selectedDate: '', 
    selectedTime: '', 
    bookingData: { name: '', phone: '', email: '', service: '' },
    ...siteData 
}" class="bg-gray-50 text-gray-900">

    <!-- Header (Shared) -->
    <header class="fixed w-full z-50 bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-reverse space-x-3">
                <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg text-white text-xl font-bold">ب</div>
                <span class="text-xl font-black text-primary" x-text="companyName"></span>
            </a>
            <nav class="hidden md:flex items-center space-x-reverse space-x-8 font-semibold">
                <a href="index.html" class="hover:text-primary transition">الرئيسية</a>
                <a href="contact.html" class="hover:text-primary transition">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <section class="pt-32 pb-20">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
                <div class="bg-primary p-8 text-white text-center">
                    <h1 class="text-3xl font-black mb-2">حجز موعد استشارة</h1>
                    <p class="opacity-80">اختر الوقت المناسب لك وسنتواصل معك لتأكيد الحجز</p>
                </div>

                <!-- Stepper -->
                <div class="flex justify-between px-8 py-6 bg-gray-50 border-b">
                    <div class="flex flex-col items-center">
                        <div :class="step >= 1 ? 'bg-primary text-white' : 'bg-gray-200 text-gray-500'" class="w-10 h-10 rounded-full flex items-center justify-center font-bold mb-2">1</div>
                        <span class="text-xs font-bold">الموعد</span>
                    </div>
                    <div class="flex-1 h-0.5 bg-gray-200 mt-5 mx-2" :class="step >= 2 ? 'bg-primary' : ''"></div>
                    <div class="flex flex-col items-center">
                        <div :class="step >= 2 ? 'bg-primary text-white' : 'bg-gray-200 text-gray-500'" class="w-10 h-10 rounded-full flex items-center justify-center font-bold mb-2">2</div>
                        <span class="text-xs font-bold">البيانات</span>
                    </div>
                    <div class="flex-1 h-0.5 bg-gray-200 mt-5 mx-2" :class="step >= 3 ? 'bg-primary' : ''"></div>
                    <div class="flex flex-col items-center">
                        <div :class="step >= 3 ? 'bg-primary text-white' : 'bg-gray-200 text-gray-500'" class="w-10 h-10 rounded-full flex items-center justify-center font-bold mb-2">3</div>
                        <span class="text-xs font-bold">التأكيد</span>
                    </div>
                </div>

                <div class="p-8">
                    <!-- Step 1: Date & Time -->
                    <div x-show="step === 1" x-transition>
                        <h3 class="text-xl font-bold mb-6 text-primary">اختر التاريخ والوقت</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label class="block text-sm font-bold mb-4 text-gray-700">التاريخ</label>
                                <input type="date" x-model="selectedDate" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-4 text-gray-700">الوقت المتاح</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <template x-for="time in ['09:00 ص', '11:00 ص', '01:00 م', '03:00 م', '05:00 م']">
                                        <button @click="selectedTime = time" :class="selectedTime === time ? 'bg-secondary text-white' : 'bg-gray-100 hover:bg-gray-200'" class="py-3 rounded-lg text-sm font-bold transition" x-text="time"></button>
                                    </template>
                                </div>
                            </div>
                        </div>
                        <div class="mt-10 flex justify-end">
                            <button @click="step = 2" :disabled="!selectedDate || !selectedTime" class="bg-primary text-white px-10 py-3 rounded-xl font-bold disabled:opacity-50">التالي</button>
                        </div>
                    </div>

                    <!-- Step 2: Details -->
                    <div x-show="step === 2" x-transition>
                        <h3 class="text-xl font-bold mb-6 text-primary">بيانات التواصل</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">الاسم</label>
                                <input type="text" x-model="bookingData.name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">رقم الهاتف</label>
                                <input type="tel" x-model="bookingData.phone" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">الخدمة المطلوبة</label>
                                <select x-model="bookingData.service" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
                                    <option value="">اختر الخدمة...</option>
                                    <template x-for="s in services">
                                        <option :value="s.title" x-text="s.title"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                        <div class="mt-10 flex justify-between">
                            <button @click="step = 1" class="text-gray-500 font-bold">رجوع</button>
                            <button @click="step = 3" :disabled="!bookingData.name || !bookingData.phone" class="bg-primary text-white px-10 py-3 rounded-xl font-bold disabled:opacity-50">تأكيد الحجز</button>
                        </div>
                    </div>

                    <!-- Step 3: Success -->
                    <div x-show="step === 3" x-transition class="text-center py-10">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                            <i class="fas fa-check"></i>
                        </div>
                        <h3 class="text-2xl font-black text-primary mb-4">تم طلب الحجز بنجاح!</h3>
                        <p class="text-gray-600 mb-8">لقد استلمنا طلب حجز موعدك في <span class="font-bold" x-text="selectedDate"></span> الساعة <span class="font-bold" x-text="selectedTime"></span>. سيقوم أحد موظفينا بالتواصل معك قريباً للتأكيد.</p>
                        <a href="index.html" class="inline-block bg-primary text-white px-8 py-3 rounded-xl font-bold">العودة للرئيسية</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="data.js"></script>
</body>
</html>
