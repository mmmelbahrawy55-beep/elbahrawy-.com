<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من نحن | ELBA 7RAWY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .page-header { background: linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.9)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop'); background-size: cover; background-position: center; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0a0a0a', secondary: '#FFD700', accent: '#1a1a1a' }
                }
            }
        }
    </script>
</head>
<body x-data="{ mobileMenuOpen: false, ...siteData }" class="bg-primary text-white">

    <!-- Header (Shared) -->
    <header class="fixed w-full z-50 bg-black/80 backdrop-blur-lg border-b border-white/5">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-secondary tracking-tighter">ELBA 7RAWY</a>
            <nav class="hidden lg:flex items-center space-x-reverse space-x-8 font-bold text-sm">
                <a href="index.html" class="hover:text-secondary transition">الرئيسية</a>
                <a href="services.html" class="hover:text-secondary transition">خدماتنا</a>
                <a href="about.html" class="text-secondary">من نحن</a>
                <a href="contact.html" class="hover:text-secondary transition">تواصل معنا</a>
            </nav>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden text-2xl text-secondary">
                <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
            </button>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header pt-48 pb-32 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-black/50"></div>
        <div class="container mx-auto px-4 relative z-10">
            <h1 class="text-5xl md:text-7xl font-black mb-6 glow" data-aos="fade-down">من نحن</h1>
            <div class="h-1.5 w-24 bg-secondary mx-auto"></div>
        </div>
    </section>

    <!-- Our Story -->
    <section class="py-32">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center gap-20">
                <div class="lg:w-1/2" data-aos="fade-left">
                    <h2 class="text-4xl font-black mb-8 text-secondary" x-text="about.title"></h2>
                    <p class="text-gray-400 leading-loose text-xl mb-10" x-text="about.description"></p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-accent p-8 rounded-3xl border border-white/5 hover:border-secondary/20 transition">
                            <i class="fas fa-eye text-secondary text-2xl mb-4"></i>
                            <h3 class="font-bold mb-3">رؤيتنا</h3>
                            <p class="text-sm text-gray-500 leading-relaxed" x-text="about.vision"></p>
                        </div>
                        <div class="bg-accent p-8 rounded-3xl border border-white/5 hover:border-secondary/20 transition">
                            <i class="fas fa-bullseye text-secondary text-2xl mb-4"></i>
                            <h3 class="font-bold mb-3">رسالتنا</h3>
                            <p class="text-sm text-gray-500 leading-relaxed" x-text="about.mission"></p>
                        </div>
                    </div>
                </div>
                <div class="lg:w-1/2" data-aos="fade-right">
                    <div class="relative">
                        <div class="absolute -top-10 -left-10 w-40 h-40 bg-secondary/10 rounded-full blur-[100px]"></div>
                        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=2070&auto=format&fit=crop" alt="Team Working" class="rounded-[3rem] shadow-2xl relative z-10 border border-white/5">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Team Section -->
    <section class="py-32 bg-black/50">
        <div class="container mx-auto px-4">
            <div class="text-center mb-20">
                <h2 class="text-4xl font-black mb-6">فريق العمل المبدع</h2>
                <div class="w-20 h-1 bg-secondary mx-auto"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl mx-auto">
                <template x-for="member in about.team">
                    <div class="bg-accent p-10 rounded-[2.5rem] text-center group hover:bg-secondary transition-all duration-500 overflow-hidden relative" data-aos="zoom-in">
                        <div class="relative w-40 h-40 mx-auto mb-8 z-10">
                            <img :src="member.image" :alt="member.name" class="rounded-full w-full h-full object-cover border-4 border-white/5 group-hover:border-black transition duration-500">
                        </div>
                        <h3 class="text-2xl font-black mb-2 group-hover:text-black transition" x-text="member.name"></h3>
                        <p class="text-secondary font-bold group-hover:text-black/70 transition" x-text="member.role"></p>
                        
                        <!-- Background decoration for hover -->
                        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-black/5 rounded-full group-hover:scale-[3] transition-transform duration-700"></div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black border-t border-white/5 py-10 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 ELBA 7RAWY. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="data.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
