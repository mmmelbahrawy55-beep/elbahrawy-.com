<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأعمال | ELBA 7RAWY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .page-header { background: linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.9)), url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=2015&auto=format&fit=crop'); background-size: cover; background-position: center; }
        
        .portfolio-card {
            perspective: 1000px;
        }
        .portfolio-image-container {
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .portfolio-card:hover .portfolio-image-container {
            transform: scale(1.05) rotateY(5deg) rotateX(2deg);
        }
        .overlay-content {
            background: linear-gradient(to top, rgba(255, 215, 0, 0.95), rgba(255, 215, 0, 0.7));
            backdrop-blur: 5px;
        }
        /* Logo Glow Effect */
        .logo-glow {
            filter: brightness(0) invert(1) saturate(0) !important;
            transition: all 0.3s ease;
        }
        .logo-glow:hover {
            transform: scale(1.05);
            filter: brightness(0) invert(1) saturate(0) !important;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0a0a0a', secondary: '#FFD700', accent: '#1a1a1a' }
                }
            }
        }
    </script>
</head>
<body x-data="{ mobileMenuOpen: false, currentCategory: 'الكل', ...siteData }" class="bg-primary text-white">

    <!-- Header (Shared) -->
    <header class="fixed w-full z-50 bg-black/80 backdrop-blur-lg border-b border-white/5">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-4">
                <img src="https://i.postimg.cc/rp3k0Sh7/albhrawy1.png" alt="شعار البحراوي للدعاية والإعلان" class="h-14 w-auto logo-glow">
                <div class="text-right flex flex-col items-center">
                    <h1 class="text-xl md:text-2xl font-black tracking-tighter leading-none flex flex-row gap-2" dir="ltr">
                        <span class="text-white">ELBA</span> <span class="text-secondary">7RAWY</span>
                    </h1>
                    <div class="w-full flex flex-col items-center mt-0.5" dir="ltr">
                        <p class="text-white text-[8px] md:text-[10px] font-bold tracking-[0.2em] leading-none">ADVERTISING</p>
                        <div class="h-[1px] w-10 md:w-14 bg-secondary rounded-full -mt-0.5"></div>
                    </div>
                </div>
            </a>
            <nav class="hidden lg:flex items-center space-x-reverse space-x-8 font-bold text-sm">
                <a href="index.html" class="hover:text-secondary transition">الرئيسية</a>
                <a href="services.html" class="hover:text-secondary transition">خدماتنا</a>
                <a href="portfolio.html" class="text-secondary">المعرض</a>
                <a href="contact.html" class="hover:text-secondary transition">تواصل معنا</a>
            </nav>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden text-2xl text-secondary">
                <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
            </button>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header pt-48 pb-32 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-black/50"></div>
        <div class="container mx-auto px-4 relative z-10">
            <h1 class="text-5xl md:text-7xl font-black mb-6 glow" data-aos="fade-down">معرض الأعمال</h1>
            <div class="h-1.5 w-24 bg-secondary mx-auto"></div>
        </div>
    </section>

    <!-- Portfolio Filter -->
    <section class="py-12 bg-black/30 sticky top-20 z-40 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto px-4 flex flex-wrap justify-center gap-4">
            <button @click="currentCategory = 'الكل'" :class="currentCategory === 'الكل' ? 'bg-secondary text-black' : 'bg-accent text-gray-400 hover:bg-white/10'" class="px-10 py-3 rounded-xl font-black transition">الكل</button>
            <button @click="currentCategory = 'تصميم جرافيكي'" :class="currentCategory === 'تصميم جرافيكي' ? 'bg-secondary text-black' : 'bg-accent text-gray-400 hover:bg-white/10'" class="px-10 py-3 rounded-xl font-black transition">تصميم جرافيكي</button>
            <button @click="currentCategory = 'تسويق رقمي'" :class="currentCategory === 'تسويق رقمي' ? 'bg-secondary text-black' : 'bg-accent text-gray-400 hover:bg-white/10'" class="px-10 py-3 rounded-xl font-black transition">تسويق رقمي</button>
            <button @click="currentCategory = 'إنتاج فيديو'" :class="currentCategory === 'إنتاج فيديو' ? 'bg-secondary text-black' : 'bg-accent text-gray-400 hover:bg-white/10'" class="px-10 py-3 rounded-xl font-black transition">إنتاج فيديو</button>
        </div>
    </section>

    <!-- Portfolio Grid -->
    <section class="py-32">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                <template x-for="project in portfolio" :key="project.id">
                    <div x-show="currentCategory === 'الكل' || currentCategory === project.category" 
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
                         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                         class="portfolio-card group relative">
                        <div class="portfolio-image-container relative overflow-hidden h-[450px] rounded-[3rem] shadow-2xl border border-white/5">
                            <img :src="project.image" :alt="project.title" class="w-full h-full object-cover transition duration-700">
                            
                            <!-- Enhanced Overlay -->
                            <div class="absolute inset-0 overlay-content opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-center p-12 text-black text-center translate-y-4 group-hover:translate-y-0">
                                <span class="text-xs font-black uppercase tracking-[0.3em] mb-6 border-b-2 border-black pb-2" x-text="project.category"></span>
                                <h3 class="text-4xl font-black mb-6 leading-tight" x-text="project.title"></h3>
                                <div class="w-12 h-1 bg-black/20 mb-6 rounded-full"></div>
                                <p class="text-lg font-bold opacity-80 mb-10 leading-relaxed" x-text="project.description"></p>
                                <div class="flex gap-4">
                                    <button class="bg-black text-white w-16 h-16 rounded-2xl flex items-center justify-center text-2xl shadow-xl hover:scale-110 transition-transform active:scale-95"><i class="fas fa-search-plus"></i></button>
                                    <a href="https://wa.me/201120053007" class="bg-white text-black px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-xl hover:scale-105 transition-transform active:scale-95">
                                        <i class="fab fa-whatsapp text-xl"></i> اطلب مثله
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black border-t border-white/5 py-10 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 ELBA 7RAWY. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="data.js"></script>
    <!-- Back to Top Button -->
    <button 
        onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
        class="fixed bottom-6 right-6 w-14 h-14 bg-secondary text-black rounded-full flex items-center justify-center font-bold text-xl shadow-lg shadow-secondary/30 hover:scale-110 transition z-50"
        aria-label="العودة لأعلى"
    >
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
