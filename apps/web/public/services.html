<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدماتنا | ELBA 7RAWY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .page-header { background: linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.9)), url('https://images.unsplash.com/photo-1557838923-2985c318be48?q=80&w=2062&auto=format&fit=crop'); background-size: cover; background-position: center; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0a0a0a', secondary: '#FFD700', accent: '#1a1a1a' }
                }
            }
        }
    </script>
</head>
<body x-data="{ mobileMenuOpen: false, ...siteData }" class="bg-primary text-white">

    <!-- Header (Shared) -->
    <header class="fixed w-full z-50 bg-black/80 backdrop-blur-lg border-b border-white/5">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-secondary tracking-tighter">ELBA 7RAWY</a>
            <nav class="hidden lg:flex items-center space-x-reverse space-x-8 font-bold text-sm">
                <a href="index.html" class="hover:text-secondary transition">الرئيسية</a>
                <a href="services.html" class="text-secondary">خدماتنا</a>
                <a href="about.html" class="hover:text-secondary transition">من نحن</a>
                <a href="contact.html" class="hover:text-secondary transition">تواصل معنا</a>
            </nav>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden text-2xl text-secondary">
                <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
            </button>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header pt-48 pb-32 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-black/50"></div>
        <div class="container mx-auto px-4 relative z-10">
            <h1 class="text-5xl md:text-7xl font-black mb-6 glow" data-aos="fade-down">خدماتنا</h1>
            <div class="h-1.5 w-24 bg-secondary mx-auto"></div>
        </div>
    </section>

    <!-- Services Detail -->
    <section class="py-32">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <template x-for="service in services" :key="service.id">
                    <div class="flex flex-col md:flex-row bg-accent rounded-[2.5rem] overflow-hidden border border-white/5 hover:border-secondary/30 transition-all duration-500 group" data-aos="fade-up">
                        <div class="md:w-1/3 bg-black/40 p-10 flex flex-col items-center justify-center text-secondary text-center group-hover:bg-secondary group-hover:text-black transition-all duration-500">
                            <i :class="service.icon" class="text-6xl mb-6"></i>
                            <h3 class="text-2xl font-black" x-text="service.title"></h3>
                        </div>
                        <div class="md:w-2/3 p-10 flex flex-col justify-center">
                            <p class="text-gray-400 mb-8 text-lg leading-relaxed" x-text="service.description"></p>
                            <div class="flex flex-wrap gap-4 mb-8">
                                <span class="bg-white/5 px-4 py-2 rounded-full text-xs font-bold text-gray-300 border border-white/5"><i class="fas fa-check ml-2 text-secondary"></i> جودة فائقة</span>
                                <span class="bg-white/5 px-4 py-2 rounded-full text-xs font-bold text-gray-300 border border-white/5"><i class="fas fa-check ml-2 text-secondary"></i> أسعار تنافسية</span>
                            </div>
                            <a href="contact.html" class="text-secondary font-black hover:underline flex items-center group-hover:translate-x-[-10px] transition-transform">
                                اطلب هذه الخدمة الآن <i class="fas fa-arrow-left mr-3"></i>
                            </a>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- AI Feature Banner -->
    <section class="py-20 bg-secondary">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl font-black text-black mb-8">هل تحتاج إلى استراتيجية تسويقية متكاملة؟</h2>
            <p class="text-black/70 text-xl max-w-2xl mx-auto mb-10 font-bold">دع نظام الذكاء الاصطناعي الخاص بنا يحلل مشروعك ويقترح عليك أفضل الخدمات التي تحقق لك أعلى عائد على الاستثمار.</p>
            <a href="contact.html" class="bg-black text-white px-12 py-5 rounded-2xl font-black text-xl hover:scale-105 transition shadow-2xl">احصل على استشارة ذكية مجاناً</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black border-t border-white/5 py-10 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 ELBA 7RAWY. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="data.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
