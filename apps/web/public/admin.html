<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | البرحاوي للدعاية والإعلان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body x-data="{ 
    tab: 'general', 
    data: siteData,
    generateNewData() {
        const str = 'const siteData = ' + JSON.stringify(this.data, null, 4) + ';';
        const blob = new Blob([str], {type: 'text/javascript'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.js';
        a.click();
    }
}" class="bg-gray-100 flex min-h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-primary text-white shrink-0">
        <div class="p-6 border-b border-white/10">
            <h1 class="text-xl font-black">لوحة التحكم</h1>
            <p class="text-xs opacity-60 mt-1">إدارة محتوى الموقع</p>
        </div>
        <nav class="p-4 space-y-2">
            <button @click="tab = 'general'" :class="tab === 'general' ? 'bg-white/10' : ''" class="w-full text-right px-4 py-3 rounded-xl flex items-center hover:bg-white/5 transition">
                <i class="fas fa-cog ml-3"></i> معلومات عامة
            </button>
            <button @click="tab = 'services'" :class="tab === 'services' ? 'bg-white/10' : ''" class="w-full text-right px-4 py-3 rounded-xl flex items-center hover:bg-white/5 transition">
                <i class="fas fa-concierge-bell ml-3"></i> الخدمات
            </button>
            <button @click="tab = 'portfolio'" :class="tab === 'portfolio' ? 'bg-white/10' : ''" class="w-full text-right px-4 py-3 rounded-xl flex items-center hover:bg-white/5 transition">
                <i class="fas fa-images ml-3"></i> معرض الأعمال
            </button>
            <button @click="tab = 'blog'" :class="tab === 'blog' ? 'bg-white/10' : ''" class="w-full text-right px-4 py-3 rounded-xl flex items-center hover:bg-white/5 transition">
                <i class="fas fa-newspaper ml-3"></i> المدونة
            </button>
        </nav>
        <div class="absolute bottom-0 w-64 p-6">
            <button @click="generateNewData()" class="w-full bg-accent text-primary font-bold py-3 rounded-xl shadow-lg hover:scale-105 transition">
                <i class="fas fa-save ml-2"></i> حفظ التغييرات
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-10 overflow-y-auto">
        <!-- General Info -->
        <div x-show="tab === 'general'" class="space-y-6">
            <h2 class="text-2xl font-black text-primary mb-8">المعلومات العامة</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm space-y-4">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-2">اسم الشركة</label>
                        <input type="text" x-model="data.companyName" class="w-full border rounded-xl px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">اسم المالك</label>
                        <input type="text" x-model="data.ownerName" class="w-full border rounded-xl px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">رقم الهاتف</label>
                        <input type="text" x-model="data.phone" class="w-full border rounded-xl px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">البريد الإلكتروني</label>
                        <input type="text" x-model="data.email" class="w-full border rounded-xl px-4 py-2">
                    </div>
                </div>
            </div>
        </div>

        <!-- Services -->
        <div x-show="tab === 'services'" class="space-y-6">
            <h2 class="text-2xl font-black text-primary mb-8">إدارة الخدمات</h2>
            <template x-for="(service, index) in data.services" :key="index">
                <div class="bg-white p-6 rounded-2xl shadow-sm mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-gray-400" x-text="'خدمة #' + (index + 1)"></span>
                        <button @click="data.services.splice(index, 1)" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="space-y-4">
                        <input type="text" x-model="service.title" class="w-full border rounded-xl px-4 py-2 font-bold" placeholder="عنوان الخدمة">
                        <textarea x-model="service.description" class="w-full border rounded-xl px-4 py-2" placeholder="وصف الخدمة"></textarea>
                    </div>
                </div>
            </template>
            <button @click="data.services.push({title: 'خدمة جديدة', description: '', icon: 'fas fa-star'})" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-xl font-bold hover:bg-gray-300 transition">+ إضافة خدمة جديدة</button>
        </div>

        <!-- Portfolio -->
        <div x-show="tab === 'portfolio'" class="space-y-6">
            <h2 class="text-2xl font-black text-primary mb-8">إدارة المعرض</h2>
            <div class="grid grid-cols-2 gap-6">
                <template x-for="(item, index) in data.portfolio" :key="index">
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <img :src="item.image" class="w-full h-32 object-cover rounded-xl mb-4">
                        <input type="text" x-model="item.title" class="w-full border rounded-xl px-4 py-2 mb-2 font-bold">
                        <input type="text" x-model="item.category" class="w-full border rounded-xl px-4 py-2 text-sm text-secondary">
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
</body>
</html>
